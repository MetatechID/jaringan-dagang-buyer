<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" preserveAspectRatio="xMidYMid slice">
  <rect width="800" height="800" fill="#FBF6EC"/>
<defs>
  <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#F3E7CF"/>
    <stop offset="100%" stop-color="#FBF6EC"/>
  </linearGradient>
  <linearGradient id="palmLeaf" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#3A6B47"/>
    <stop offset="100%" stop-color="#1F4128"/>
  </linearGradient>
</defs>
<rect width="800" height="800" fill="url(#bgGrad)"/>
<!-- subtle pattern -->
<g opacity="0.06" fill="#6B2C1A">
  <circle cx="80" cy="80" r="40"/>
  <circle cx="720" cy="120" r="60"/>
  <circle cx="120" cy="700" r="50"/>
  <circle cx="680" cy="680" r="40"/>
</g>
<!-- palm leaves -->
<g transform="translate(110,640) rotate(-20)">
  <path d="M 0 0 Q 30 -80 0 -160 Q -30 -80 0 0 Z" fill="url(#palmLeaf)"/>
  <path d="M 0 -160 Q 60 -200 80 -260" stroke="url(#palmLeaf)" stroke-width="6" fill="none"/>
  <path d="M 0 -160 Q -60 -200 -80 -260" stroke="url(#palmLeaf)" stroke-width="6" fill="none"/>
</g>
<!-- centerpiece kurma jar -->
<g transform="translate(560,420)">
  <ellipse cx="0" cy="180" rx="120" ry="14" fill="#000" opacity="0.10"/>
  <rect x="-100" y="-180" width="200" height="40" rx="10" fill="#D4A24C" stroke="#2A1810" stroke-width="2"/>
  <rect x="-94" y="-140" width="188" height="320" rx="14" fill="#6B2C1A" stroke="#2A1810" stroke-width="2"/>
  <rect x="-78" y="-100" width="156" height="180" rx="8" fill="#FBF6EC"/>
  <text x="0" y="-58" font-family="Georgia, serif" font-size="26" font-weight="700" fill="#6B2C1A" text-anchor="middle">Safiya</text>
  <text x="0" y="-36" font-family="Georgia, serif" font-size="11" font-style="italic" fill="#D4A24C" text-anchor="middle">authentic premium</text>
  <text x="0" y="0" font-family="Georgia, serif" font-size="20" font-weight="700" fill="#6B2C1A" text-anchor="middle">Kurma Sukari</text>
  <ellipse cx="-30" cy="40" rx="14" ry="20" fill="#6B2C1A"/>
  <ellipse cx="0" cy="34" rx="16" ry="22" fill="#6B2C1A"/>
  <ellipse cx="30" cy="40" rx="14" ry="20" fill="#6B2C1A"/>
</g>
<text x="60" y="340" font-family="Georgia, serif" font-size="64" font-weight="700" fill="#6B2C1A">Safiya</text>
<text x="60" y="380" font-family="Georgia, serif" font-size="22" font-style="italic" fill="#D4A24C">authentic premium · since 2018</text>
<text x="60" y="450" font-family="Inter, sans-serif" font-size="16" fill="#2A1810" opacity="0.8">Kurma · Muesli · Madu · Healthy Pantry</text>
</svg>

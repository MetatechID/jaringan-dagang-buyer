<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" preserveAspectRatio="xMidYMid slice">
  <rect width="800" height="800" fill="#FBF6EC"/>
<g transform="translate(400,420)">
  <ellipse cx="0" cy="306" rx="180" ry="21" fill="#000" opacity="0.1"/>
  <!-- Pouch shape -->
  <path d="M -190 -260
           Q -190 -290 -160 -290
           L 160 -290
           Q 190 -290 190 -260
           L 190 270
           Q 190 290 160 290
           L -160 290
           Q -190 290 -190 270 Z"
        fill="#6B2C1A" stroke="#2A1810" stroke-width="2"/>
  <!-- Top seal -->
  <rect x="-190" y="-290" width="380" height="38" fill="#2A1810" opacity="0.25"/>
  <line x1="-178" y1="-272" x2="178" y2="-272" stroke="#FBF6EC" stroke-width="1" stroke-dasharray="6 4"/>
  <!-- Label panel -->
  <rect x="-160" y="-220" width="320" height="180" rx="10" fill="#FBF6EC"/>
  <text x="0" y="-172" font-family="Georgia, serif" font-size="34" font-weight="700" fill="#6B2C1A" text-anchor="middle">Safiya</text>
  <text x="0" y="-146" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#D4A24C" text-anchor="middle">healthy · tasty · authentic</text>
  <text x="0" y="-104" font-family="Georgia, serif" font-size="22" font-weight="700" fill="#6B2C1A" text-anchor="middle">Muesli Fruit &amp; Seed</text>
  <text x="0" y="-78" font-family="Inter, sans-serif" font-size="11" fill="#2A1810" opacity="0.6" text-anchor="middle" letter-spacing="2">HIGH FIBER · HALAL</text>
  <!-- Art -->
  <g transform="translate(0,50)">
    <circle cx="-60" cy="20" r="22" fill="#A8424B"/>
    <circle cx="-30" cy="36" r="20" fill="#8E2A30"/>
    <circle cx="0" cy="14" r="18" fill="#D4A24C"/>
    <ellipse cx="30" cy="30" rx="22" ry="14" fill="#C9A961" transform="rotate(20 30 30)"/>
    <circle cx="60" cy="14" r="18" fill="#5B341E"/>
  </g>

  <!-- Size badge -->
  <rect x="-90" y="200" width="180" height="40" rx="20" fill="#B8761F"/>
  <text x="0" y="227" font-family="Inter, sans-serif" font-size="18" font-weight="800" fill="#FFFFFF" text-anchor="middle">500G NETTO</text>
  <text x="0" y="260" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#FBF6EC" text-anchor="middle" letter-spacing="3">HALAL · BPOM RI</text>
</g>

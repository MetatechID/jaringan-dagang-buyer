<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" preserveAspectRatio="xMidYMid slice">
  <rect width="800" height="800" fill="#FBF6EC"/>
<g transform="translate(400, 400)">
  <ellipse cx="0" cy="330.0" rx="160" ry="19" fill="#000" opacity="0.1"/>
  <!-- Cap -->
  <rect x="-32" y="-370.0" width="64" height="70" rx="6" fill="#6B2C1A"/>
  <rect x="-26" y="-362.0" width="52" height="6" rx="2" fill="#2A1810" opacity="0.4"/>
  <!-- Neck -->
  <rect x="-22" y="-314.0" width="44" height="14" fill="#2A1810" opacity="0.18"/>
  <!-- Bottle body -->
  <path d="M -110 -280.0
           L -110 260.0
           Q -110 300.0 -70 300.0
           L 70 300.0
           Q 110 300.0 110 260.0
           L 110 -280.0
           Q 110 -300.0 70 -300.0
           L -70 -300.0
           Q -110 -300.0 -110 -280.0 Z"
        fill="#F1E6CB" stroke="#2A1810" stroke-width="2"/>
  <!-- Label -->
  <rect x="-90" y="-220.0" width="180" height="240" rx="10" fill="#FBF6EC"/>
  <text x="0" y="-176.0" font-family="Georgia, serif" font-size="30" font-weight="700" fill="#6B2C1A" text-anchor="middle">Safiya</text>
  <text x="0" y="-152.0" font-family="Inter, sans-serif" font-size="11" fill="#D4A24C" text-anchor="middle" letter-spacing="2.5">PURE COCONUT OIL</text>
  <text x="0" y="-108.0" font-family="Georgia, serif" font-size="22" font-weight="700" fill="#6B2C1A" text-anchor="middle">VCO Coconut</text>
  <text x="0" y="-84.0" font-family="Inter, sans-serif" font-size="11" fill="#2A1810" opacity="0.6" text-anchor="middle" letter-spacing="2.5">COLD PRESSED · NATURAL</text>
  <!-- Size pill -->
  <rect x="-60" y="-60.0" width="120" height="30" rx="15" fill="#B8761F"/>
  <text x="0" y="-40.0" font-family="Inter, sans-serif" font-size="14" font-weight="800" fill="#FFFFFF" text-anchor="middle">500ML</text>
  <!-- Liquid level indicator (more "filled" for bigger size) -->
  <rect x="-100" y="220.0" width="200" height="50" fill="rgba(212,162,76,0.25)" rx="6"/>
</g>
</svg>

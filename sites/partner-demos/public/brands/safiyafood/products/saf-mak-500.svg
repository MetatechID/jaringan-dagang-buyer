<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" preserveAspectRatio="xMidYMid slice">
  <rect width="800" height="800" fill="#FBF6EC"/>
<g transform="translate(400, 400)">
        <ellipse cx="0" cy="260" rx="160" ry="19" fill="#000" opacity="0.1"/>
        <!-- Lid -->
        <rect x="-140" y="-310" width="280" height="60" rx="10" fill="#6B2C1A" stroke="#2A1810" stroke-width="2"/>
        <ellipse cx="0" cy="-310" rx="140" ry="10" fill="#B8761F"/>
        <!-- Jar body — different curve per size -->
        <path d="M -150 -250
                 Q -150 -230 -140 -226
                 L -140 220
                 Q -140 250 -110 250
                 L 110 250
                 Q 140 250 140 220
                 L 140 -226
                 Q 150 -230 150 -250 Z"
              fill="#E4C167" stroke="#2A1810" stroke-width="2"/>
        <!-- Label sticker -->
        <rect x="-120" y="-190" width="240" height="220" rx="10" fill="#FBF6EC"/>
        <text x="0" y="-148" font-family="Georgia, serif" font-size="32" font-weight="700" fill="#6B2C1A" text-anchor="middle">Safiya</text>
        <text x="0" y="-126" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#D4A24C" text-anchor="middle">pure · raw</text>
        <line x1="-50" y1="-114" x2="50" y2="-114" stroke="#D4A24C" stroke-width="1"/>
        <text x="0" y="-80" font-family="Georgia, serif" font-size="22" font-weight="700" fill="#6B2C1A" text-anchor="middle">Madu Akasia</text>
        <text x="0" y="-56" font-family="Inter, sans-serif" font-size="11" fill="#2A1810" opacity="0.6" text-anchor="middle" letter-spacing="2">NATURAL · UNFILTERED</text>
        <!-- Honey drips visualisation -->
        <g transform="translate(0,-26)">
          <path d="M -30 0 Q 0 14 30 0" stroke="#D4A24C" stroke-width="3" fill="none"/>
          <circle cx="-30" cy="2" r="3" fill="#D4A24C"/>
          <circle cx="0" cy="14" r="3" fill="#D4A24C"/>
          <circle cx="30" cy="2" r="3" fill="#D4A24C"/>
        </g>
        <!-- Size badge -->
        <rect x="-80" y="190" width="160" height="36" rx="18" fill="#B8761F"/>
        <text x="0" y="215" font-family="Inter, sans-serif" font-size="16" font-weight="800" fill="#FFFFFF" text-anchor="middle">500ML NETTO</text>
        <g transform="translate(200,-170) rotate(20)">
  <rect x="-4" y="-100" width="8" height="100" fill="#B8761F" stroke="#2A1810" stroke-width="1"/>
  <g stroke="#D4A24C" stroke-width="3" fill="none">
    <line x1="-12" y1="-4" x2="12" y2="-4"/>
    <line x1="-14" y1="6" x2="14" y2="6"/>
    <line x1="-16" y1="16" x2="16" y2="16"/>
    <line x1="-18" y1="26" x2="18" y2="26"/>
    <line x1="-20" y1="36" x2="20" y2="36"/>
  </g>
</g>
      </g>
</svg>

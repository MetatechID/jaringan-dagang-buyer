<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" preserveAspectRatio="xMidYMid slice">
  <rect width="800" height="800" fill="#FBF6EC"/>
<g transform="translate(400, 380)">
  <ellipse cx="0" cy="240" rx="260" ry="31" fill="#000" opacity="0.1"/>
  <!-- Handle -->
  <path d="M -200 -180 Q 0 -280 200 -180" stroke="#2A1810" stroke-width="8" fill="none" stroke-linecap="round"/>
  <path d="M -200 -180 Q 0 -280 200 -180" stroke="#B8761F" stroke-width="4" fill="none" stroke-linecap="round"/>
  <!-- Lid disc -->
  <ellipse cx="0" cy="-180" rx="240" ry="36" fill="#D4A24C" stroke="#2A1810" stroke-width="2"/>
  <ellipse cx="0" cy="-188" rx="200" ry="28" fill="none" stroke="#2A1810" stroke-width="1.5" opacity="0.4"/>
  <!-- Ember body — slightly tapered trapezoid -->
  <path d="M -240 -180 L -200 220 L 200 220 L 240 -180 Z" fill="#6B2C1A" stroke="#2A1810" stroke-width="2"/>
  <!-- Front label sticker -->
  <rect x="-170" y="-130" width="340" height="280" rx="14" fill="#FBF6EC" stroke="#D4A24C" stroke-width="2"/>
  <text x="0" y="-86" font-family="Georgia, serif" font-size="44" font-weight="700" fill="#6B2C1A" text-anchor="middle">Safiya</text>
  <text x="0" y="-58" font-family="Georgia, serif" font-size="16" font-style="italic" fill="#D4A24C" text-anchor="middle">authentic premium · halal</text>
  <line x1="-110" y1="-42" x2="110" y2="-42" stroke="#D4A24C" stroke-width="1.5"/>
  <text x="0" y="-4" font-family="Georgia, serif" font-size="32" font-weight="700" fill="#6B2C1A" text-anchor="middle">Kurma Sukari</text>
  <text x="0" y="20" font-family="Inter, sans-serif" font-size="11" fill="#2A1810" opacity="0.65" text-anchor="middle" letter-spacing="3">EMBER · BULK PACK</text>
  <!-- Large size badge -->
  <rect x="-110" y="60" width="220" height="44" rx="22" fill="#2A1810"/>
  <text x="0" y="90" font-family="Inter, sans-serif" font-size="20" font-weight="800" fill="#D4A24C" text-anchor="middle" letter-spacing="1.5">3KG · FAMILY</text>
  <!-- Date silhouettes -->
  <g transform="translate(0, 130)">
    <ellipse cx="-80" cy="0" rx="22" ry="32" fill="#A06030"/>
    <ellipse cx="-40" cy="-6" rx="24" ry="34" fill="#A06030"/>
    <ellipse cx="0" cy="0" rx="22" ry="32" fill="#A06030"/>
    <ellipse cx="40" cy="-6" rx="24" ry="34" fill="#A06030"/>
    <ellipse cx="80" cy="0" rx="22" ry="32" fill="#A06030"/>
  </g>
  <!-- Volume mark -->
  <text x="200" y="180" font-family="Inter, sans-serif" font-size="13" font-weight="700" fill="#FFFFFF" text-anchor="end" letter-spacing="1">NETTO</text>
  <text x="200" y="200" font-family="Inter, sans-serif" font-size="16" font-weight="800" fill="#D4A24C" text-anchor="end">3KG</text>
</g>
</svg>

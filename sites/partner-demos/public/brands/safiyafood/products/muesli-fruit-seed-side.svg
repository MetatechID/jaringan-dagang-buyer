<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" preserveAspectRatio="xMidYMid slice">
  <rect width="800" height="800" fill="#F3E7CF"/>
<g transform="translate(400,420)">
  <ellipse cx="0" cy="256" rx="170" ry="20" fill="#000" opacity="0.1"/>
  <!-- Pouch shape -->
  <path d="M -180 -210
           Q -180 -240 -150 -240
           L 150 -240
           Q 180 -240 180 -210
           L 180 220
           Q 180 240 150 240
           L -150 240
           Q -180 240 -180 220 Z"
        fill="#6B2C1A" stroke="#2A1810" stroke-width="2"/>
  <!-- Top seal -->
  <rect x="-180" y="-240" width="360" height="38" fill="#2A1810" opacity="0.25"/>
  <line x1="-168" y1="-222" x2="168" y2="-222" stroke="#FBF6EC" stroke-width="1" stroke-dasharray="6 4"/>
  <!-- Label panel -->
  <rect x="-150" y="-170" width="300" height="180" rx="10" fill="#FBF6EC"/>
  <text x="0" y="-122" font-family="Georgia, serif" font-size="34" font-weight="700" fill="#6B2C1A" text-anchor="middle">Safiya</text>
  <text x="0" y="-96" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#D4A24C" text-anchor="middle">healthy · tasty · authentic</text>
  <text x="0" y="-54" font-family="Georgia, serif" font-size="22" font-weight="700" fill="#6B2C1A" text-anchor="middle">Muesli Fruit & Seed</text>
  <text x="0" y="-28" font-family="Inter, sans-serif" font-size="11" fill="#2A1810" opacity="0.6" text-anchor="middle" letter-spacing="2">HIGH FIBER · HALAL</text>
  <!-- Art -->
  <g transform="translate(0,100)">
    <circle cx="-60" cy="20" r="22" fill="#A8424B"/>
    <circle cx="-30" cy="36" r="20" fill="#8E2A30"/>
    <circle cx="0" cy="14" r="18" fill="#D4A24C"/>
    <ellipse cx="30" cy="30" rx="22" ry="14" fill="#C9A961" transform="rotate(20 30 30)"/>
    <circle cx="60" cy="14" r="18" fill="#5B341E"/>
  </g>

  <!-- Size badge -->
  <rect x="-90" y="150" width="180" height="40" rx="20" fill="#D4A24C"/>
  <text x="0" y="177" font-family="Inter, sans-serif" font-size="18" font-weight="800" fill="#FFFFFF" text-anchor="middle">300G NETTO</text>
  <text x="0" y="210" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#FBF6EC" text-anchor="middle" letter-spacing="3">HALAL · BPOM RI</text>
</g>
</svg>
